  <rect x="378" y="130" width="16" height="70" fill="#1565C0" rx="1.5" opacity="0.85"/>
  <line x1="386" y1="121" x2="386" y2="139" stroke="#0d3c7a" stroke-width="1.2"/>
  <line x1="383" y1="121" x2="389" y2="121" stroke="#0d3c7a" stroke-width="1"/>
  <line x1="383" y1="139" x2="389" y2="139" stroke="#0d3c7a" stroke-width="1"/>
  <!-- TEC + ANDV ~2.8 → height 78 -->
  <rect x="397" y="122" width="16" height="78" fill="#C62828" rx="1.5" opacity="0.85"/>
  <line x1="405" y1="113" x2="405" y2="131" stroke="#7b1717" stroke-width="1.2"/>
  <line x1="402" y1="113" x2="408" y2="113" stroke="#7b1717" stroke-width="1"/>
  <line x1="402" y1="131" x2="408" y2="131" stroke="#7b1717" stroke-width="1"/>

  <!-- NK (low) ~0.5 → height 14 -->
  <rect x="431" y="186" width="16" height="14" fill="#78909C" rx="1.5" opacity="0.85"/>

  <!-- Fibroblast ~0.3 → height 8 -->
  <rect x="458" y="192" width="16" height="8" fill="#78909C" rx="1.5" opacity="0.85"/>

  <!-- ns bracket between PMVEC and TEC groups -->
  <line x1="333" y1="108" x2="386" y2="108" stroke="#555" stroke-width="0.9"/>
  <line x1="333" y1="105" x2="333" y2="111" stroke="#555" stroke-width="0.9"/>
  <line x1="386" y1="105" x2="386" y2="111" stroke="#555" stroke-width="0.9"/>
  <text x="360" y="106" font-size="7.5" text-anchor="middle" fill="#555">ns  p=0.74</text>

  <!-- x-axis labels -->
  <text x="338" y="213" font-size="7.5" text-anchor="middle" fill="#2E7D32" font-weight="600">PMVEC</text>
  <text x="392" y="213" font-size="7.5" text-anchor="middle" fill="#E65100" font-weight="600">TEC</text>
  <text x="439" y="213" font-size="7" text-anchor="middle" fill="#555">NK</text>
  <text x="466" y="213" font-size="7" text-anchor="middle" fill="#555">Fibro</text>
  <text x="338" y="222" font-size="6.5" text-anchor="middle" fill="#888">(lung)</text>
  <text x="392" y="222" font-size="6.5" text-anchor="middle" fill="#888">(kidney)</text>

  <!-- legend -->
  <rect x="310" y="230" width="9" height="9" fill="#1565C0" rx="1.5"/>
  <text x="322" y="238" font-size="7.5" fill="#1565C0">HTNV-infected</text>
  <rect x="400" y="230" width="9" height="9" fill="#C62828" rx="1.5"/>
  <text x="412" y="238" font-size="7.5" fill="#C62828">ANDV-infected</text>

  <text x="395" y="260" font-size="8.5" text-anchor="middle" fill="#222" font-weight="600">Same receptor, same cell types — different organ fate</text>
  <text x="395" y="273" font-size="7.5" text-anchor="middle" fill="#555">β3 integrin expression is equivalent in PMVEC and TEC (ns),</text>
  <text x="395" y="284" font-size="7.5" text-anchor="middle" fill="#555">yet organ-specific pathology remains unexplained</text>

  <!-- ════════════════════════════════════════════
       PANEL C  — MS-VIC Multi-scale Framework
       x: 515–790, y: 28–295
  ════════════════════════════════════════════ -->

  <!-- defs for arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#555"/>
    </marker>
    <marker id="arr-w" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#ffffff"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="652" y="43" font-size="9" text-anchor="middle" fill="#333" font-weight="600">Multi-scale Virtual Infected Cell (MS-VIC)</text>

  <!-- Scale 1: Atoms/MD -->
  <rect x="520" y="52" width="128" height="38" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="584" y="67" font-size="8.5" text-anchor="middle" fill="#1565C0" font-weight="700">Stage 0: MD Simulation</text>
  <text x="584" y="79" font-size="7.5" text-anchor="middle" fill="#1565C0">Gc–β3 integrin · ΔG_bind · Conformations</text>
  <text x="516" y="64" font-size="7" fill="#888">Atomic</text>

  <!-- arrow down -->
  <line x1="584" y1="90" x2="584" y2="108" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Scale 2: PPI / Network -->
  <rect x="520" y="108" width="128" height="38" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="584" y="123" font-size="8.5" text-anchor="middle" fill="#7B1FA2" font-weight="700">Stage 1–2: Signal Network</text>
  <text x="584" y="135" font-size="7.5" text-anchor="middle" fill="#7B1FA2">Phosphoproteomics · GRN · Pathway fork</text>
  <text x="516" y="120" font-size="7" fill="#888">Protein</text>

  <!-- arrow down -->
  <line x1="584" y1="146" x2="584" y2="164" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Scale 3: Cell / scRNA-seq -->
  <rect x="520" y="164" width="128" height="38" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="584" y="179" font-size="8.5" text-anchor="middle" fill="#2E7D32" font-weight="700">Stage 3: VIC Model</text>
  <text x="584" y="191" font-size="7.5" text-anchor="middle" fill="#2E7D32">scRNA-seq · Fate prediction · Blind test</text>
  <text x="516" y="176" font-size="7" fill="#888">Cell</text>

  <!-- arrow down -->
  <line x1="584" y1="202" x2="584" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Scale 4: Organ / Patient -->
  <rect x="520" y="220" width="128" height="38" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
  <text x="584" y="235" font-size="8.5" text-anchor="middle" fill="#E65100" font-weight="700">Stage 4: Clinical Validation</text>
  <text x="584" y="247" font-size="7.5" text-anchor="middle" fill="#E65100">Patient cohort · Prognosis · Biomarkers</text>
  <text x="516" y="232" font-size="7" fill="#888">Organ</text>

  <!-- Right side: HTNV → HFRS + ANDV → HPS branches -->
  <!-- Branch from Stage 3 -->
  <line x1="648" y1="183" x2="680" y2="163" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="648" y1="183" x2="680" y2="203" stroke="#C62828" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- HFRS outcome box -->
  <rect x="680" y="148" width="105" height="30" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="732" y="161" font-size="8" text-anchor="middle" fill="#1565C0" font-weight="700">HTNV → HFRS</text>
  <text x="732" y="172" font-size="7" text-anchor="middle" fill="#1565C0">Kidney · Complement</text>

  <!-- HPS outcome box -->
  <rect x="680" y="188" width="105" height="30" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="732" y="201" font-size="8" text-anchor="middle" fill="#C62828" font-weight="700">ANDV → HPS</text>
  <text x="732" y="212" font-size="7" text-anchor="middle" fill="#C62828">Lung · VE-cadherin</text>

  <!-- Connecting question mark above branches -->
  <text x="665" y="160" font-size="14" text-anchor="middle" fill="#F57F17" font-weight="700">?</text>
  <text x="665" y="174" font-size="7" text-anchor="middle" fill="#F57F17">15-aa Δ</text>

  <!-- bottom label -->
  <text x="652" y="280" font-size="8.5" text-anchor="middle" fill="#222" font-weight="600">Integrated multi-scale prediction pipeline</text>
  <text x="652" y="293" font-size="7.5" text-anchor="middle" fill="#555">Atoms → Proteins → Cells → Organ outcomes</text>

  <!-- ── figure caption line ── -->
  <line x1="12" y1="302" x2="788" y2="302" stroke="#cccccc" stroke-width="0.6"/>
  <text x="12" y="308" font-size="6.5" fill="#888">Fig. 1 | Clinical paradox of hantavirus organ tropism and the MS-VIC research framework. A, Organ-specific clinical markers in HFRS vs HPS patients. B, β3 integrin protein expression is comparable across cell types. C, Multi-scale VIC pipeline.</text>
</svg>
