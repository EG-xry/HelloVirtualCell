  <text x="146" y="165" font-size="6.5" fill="#888" text-anchor="start">normal</text>
  <text x="55" y="207" font-size="8" text-anchor="middle" fill="#333" font-style="italic">Kidney marker</text>

  <!-- A right: PaO₂/FiO₂ -->
