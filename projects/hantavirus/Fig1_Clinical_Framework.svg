  <line x1="161" y1="132" x2="165" y2="132" stroke="#555" stroke-width="0.9"/>
  <text x="159" y="135" font-size="7" text-anchor="end" fill="#444">200</text>
  <line x1="161" y1="108" x2="165" y2="108" stroke="#555" stroke-width="0.9"/>
  <text x="159" y="111" font-size="7" text-anchor="end" fill="#444">300</text>
  <line x1="161" y1="84" x2="165" y2="84" stroke="#555" stroke-width="0.9"/>
  <text x="159" y="87" font-size="7" text-anchor="end" fill="#444">400</text>
  <line x1="161" y1="60" x2="165" y2="60" stroke="#555" stroke-width="0.9"/>
  <text x="159" y="63" font-size="7" text-anchor="end" fill="#444">500</text>
  <!-- grid -->
  <line x1="165" y1="108" x2="258" y2="108" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="165" y1="132" x2="258" y2="132" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="165" y1="84" x2="258" y2="84" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="165" y1="60" x2="258" y2="60" stroke="#eeeeee" stroke-width="0.7"/>
