  <rect x="207" y="89" width="18" height="91" fill="#1565C0" rx="1"/>
  <line x1="216" y1="83" x2="216" y2="95" stroke="#333" stroke-width="1.2"/>
  <line x1="213" y1="83" x2="219" y2="83" stroke="#333" stroke-width="1"/>
  <line x1="213" y1="95" x2="219" y2="95" stroke="#333" stroke-width="1"/>

  <!-- HPS PaO2/FiO2 ~175 → height = 42, y = 138 -->
  <rect x="237" y="138" width="18" height="42" fill="#C62828" rx="1"/>
  <line x1="246" y1="128" x2="246" y2="138" stroke="#333" stroke-width="1.2"/>
  <line x1="243" y1="128" x2="249" y2="128" stroke="#333" stroke-width="1"/>
  <line x1="243" y1="138" x2="249" y2="138" stroke="#333" stroke-width="1"/>

  <!-- significance -->
  <text x="216" y="81" font-size="8" text-anchor="middle" fill="#777">ns</text>
  <text x="246" y="126" font-size="8" text-anchor="middle" fill="#333">***</text>

  <!-- x labels -->
  <text x="186" y="192" font-size="7" text-anchor="middle" fill="#555">Ctrl</text>
  <text x="216" y="192" font-size="7" text-anchor="middle" fill="#1565C0">HFRS</text>
  <text x="246" y="192" font-size="7" text-anchor="middle" fill="#C62828">HPS</text>
  <!-- normal range -->
  <rect x="165" y="72" width="93" height="12" fill="#FFF9C4" opacity="0.7"/>
  <text x="259" y="81" font-size="6.5" fill="#888">normal</text>
  <text x="215" y="207" font-size="8" text-anchor="middle" fill="#333" font-style="italic">Lung marker</text>

  <!-- Panel A subtitle -->
  <text x="130" y="225" font-size="8.5" text-anchor="middle" fill="#222" font-weight="600">Organ-specific disease markers (n=130 patients)</text>
  <text x="130" y="238" font-size="7.5" text-anchor="middle" fill="#555">HFRS and HPS share β3 integrin receptor yet damage</text>
  <text x="130" y="249" font-size="7.5" text-anchor="middle" fill="#555">different organs — a 30-year unsolved paradox</text>

  <!-- ════════════════════════════════════════════
       PANEL B  — β3 Integrin Expression Paradox
       x: 270–500, y: 28–295
  ════════════════════════════════════════════ -->

  <!-- axis -->
  <line x1="308" y1="60" x2="308" y2="200" stroke="#555" stroke-width="0.9"/>
  <line x1="308" y1="200" x2="490" y2="200" stroke="#555" stroke-width="0.9"/>
  <!-- y-axis: 0–5 AU -->
  <text x="302" y="203" font-size="7" text-anchor="end" fill="#444">0</text>
  <line x1="304" y1="172" x2="308" y2="172" stroke="#555" stroke-width="0.8"/>
  <text x="302" y="175" font-size="7" text-anchor="end" fill="#444">1</text>
  <line x1="304" y1="144" x2="308" y2="144" stroke="#555" stroke-width="0.8"/>
  <text x="302" y="147" font-size="7" text-anchor="end" fill="#444">2</text>
  <line x1="304" y1="116" x2="308" y2="116" stroke="#555" stroke-width="0.8"/>
  <text x="302" y="119" font-size="7" text-anchor="end" fill="#444">3</text>
  <line x1="304" y1="88" x2="308" y2="88" stroke="#555" stroke-width="0.8"/>
  <text x="302" y="91" font-size="7" text-anchor="end" fill="#444">4</text>
  <line x1="304" y1="60" x2="308" y2="60" stroke="#555" stroke-width="0.8"/>
  <text x="302" y="63" font-size="7" text-anchor="end" fill="#444">5</text>
  <!-- grid -->
  <line x1="308" y1="172" x2="490" y2="172" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="308" y1="144" x2="490" y2="144" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="308" y1="116" x2="490" y2="116" stroke="#eeeeee" stroke-width="0.7"/>
  <line x1="308" y1="88" x2="490" y2="88" stroke="#eeeeee" stroke-width="0.7"/>
  <text x="285" y="130" font-size="8" text-anchor="middle" fill="#333" transform="rotate(-90,285,130)">β3 Integrin (AU)</text>

  <!-- Cell type groups: PMVEC (2 bars: HTNV, ANDV), then TEC (2 bars), then NK, Fibro -->
  <!-- Scale: 0–5 → 0–140px; y_bar = 200 - val*28 -->
  <!-- PMVEC group: x ~ 330, 350 -->
  <!-- PMVEC + HTNV ~2.8 → 200 - 2.8*28 = 121.6 → height 78.4 -->
  <rect x="325" y="122" width="16" height="78" fill="#1565C0" rx="1.5" opacity="0.85"/>
  <line x1="333" y1="113" x2="333" y2="131" stroke="#0d3c7a" stroke-width="1.2"/>
  <line x1="330" y1="113" x2="336" y2="113" stroke="#0d3c7a" stroke-width="1"/>
  <line x1="330" y1="131" x2="336" y2="131" stroke="#0d3c7a" stroke-width="1"/>
  <!-- PMVEC + ANDV ~2.6 → height 72.8 -->
  <rect x="344" y="127" width="16" height="73" fill="#C62828" rx="1.5" opacity="0.85"/>
  <line x1="352" y1="118" x2="352" y2="136" stroke="#7b1717" stroke-width="1.2"/>
  <line x1="349" y1="118" x2="355" y2="118" stroke="#7b1717" stroke-width="1"/>
  <line x1="349" y1="136" x2="355" y2="136" stroke="#7b1717" stroke-width="1"/>

